name: build-runtime-packages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.adoc'
      - '**.md'  
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.adoc'
      - '**.md'
  repository_dispatch:
    types: [ 'tebako release' ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild and overwrite existing runtime packages'
        type: boolean
        default: false
      env_filter:
        description: 'Platform slice: "all" or "<os>/<arch>" (e.g. "linux-musl/arm64")'
        type: string
        default: 'all'
      ruby_filter:
        description: 'Rubies: "full", "tidy", or comma-separated versions (e.g. "3.3.7,3.4.2")'
        type: string
        default: 'full'
      publish:
        description: 'Run the release job (add this run''s packages to the release)'
        type: boolean
        default: true
      artifact_run_ids:
        description: 'Extra run IDs (comma-separated) whose runtime-packages-* artifacts join the release'
        type: string
        default: ''

concurrency:
  # Slice dispatches (env/ruby filters) get their own group so a debugging
  # slice never cancels the full build (or another slice) on the same ref
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}${{ github.event_name == ''workflow_dispatch'' && format(''-{0}-{1}'', inputs.env_filter, inputs.ruby_filter) || '''' }}'
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  CACHE_VER: 1
  VERBOSE: no
  RUNTIME_REPO: tamatebako/tebako-runtime-ruby

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      tebako-version: ${{ steps.get-version.outputs.version }}
      env-matrix: ${{ steps.set-matrix.outputs.env-matrix }}
      ruby-matrix: ${{ steps.set-matrix.outputs.ruby-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Get Tebako version
        id: get-version
        run: |
          gem install tebako
          version=$(gem info tebako | head -n 1 | awk -F'[()]' '{print $2}')
          echo "Building runtimes for Tebako version $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate build matrix
        id: set-matrix
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MATRIX_ENV_FILTER: ${{ inputs.env_filter || '' }}
          MATRIX_RUBY_FILTER: ${{ inputs.ruby_filter || '' }}
        run: |
          ./scripts/generate_matrix.rb

  build:
    name: Build runtime package for ${{ matrix.env.os }} / ${{ matrix.env.arch }} / Ruby ${{ matrix.ruby }}
    needs: prepare
    runs-on: ${{ matrix.env.host }}
    # Windows legs are advisory: the Ruby build on UCRT64 is broken upstream
    # (win32.c clock_gettime/clock_getres collide with modern winpthreads
    # headers; tebako's own windows-msys CI has been red for months). The
    # release job runs always() and publishes the POSIX packages.
    continue-on-error: ${{ matrix.env.os == 'windows' }}
    strategy:
      fail-fast: false
      matrix:
        env: ${{fromJson(needs.prepare.outputs.env-matrix)}}
        ruby: ${{fromJson(needs.prepare.outputs.ruby-matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Create folder for runtime packages
        run: |
          mkdir -p runtime-packages

      # Per-(platform, ruby) cache of the whole tebako prefix (.tebako), which
      # holds both the ruby-independent deps and the ruby-specific press output.
      # Host-native jobs only: container jobs build inside the CI container
      # image whose deps are baked into the image itself, so there is no
      # host-side path to cache (the container image is the cache).
      - name: Cache tebako prefix
        if: matrix.env.container == null
        uses: actions/cache@v4
        with:
          path: .tebako
          key: tebako-runtime-${{ matrix.env.os }}-${{ matrix.env.arch }}-${{ matrix.ruby }}-${{ needs.prepare.outputs.tebako-version }}-v${{ env.CACHE_VER }}

      - name: Build runtime using ci container
        if: matrix.env.container != null
        run: |
          container="ghcr.io/tamatebako/tebako-${{ matrix.env.container }}:${{ needs.prepare.outputs.tebako-version }}"
          echo "Building runtime for Ruby ${{ matrix.ruby }} on ${{ matrix.env.os }}/${{ matrix.env.arch }}"
          runtime="tebako-runtime-${{ needs.prepare.outputs.tebako-version }}-${{ matrix.ruby }}-${{ matrix.env.os }}-${{ matrix.env.arch }}"
          docker run -v ${{github.workspace}}:/mnt/w -t $container \
            tebako press -m runtime -o="/mnt/w/runtime-packages/$runtime" -R=${{ matrix.ruby }} ${{ matrix.env.os == 'linux-gnu' && '--patchelf' || '' }}

      - name: Setup MSys
        if: matrix.env.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          path-type: minimal
          update: true

      - name: Setup Tebako
        if: matrix.env.container == null
        uses: tamatebako/tebako/.github/actions/setup-tebako@main
        with:
          cache: build
          cache_ver: ${{ env.CACHE_VER }}
          # Xcode selection matters on macos-15 images (the action's defaults,
          # 14.3.1/15.0.1, are not installed there); null off-macOS, where the
          # action falls back to its defaults and setup-xcode does not run.
          xcode: ${{ matrix.env.xcode }}
          # Deps are ruby-independent, so the action's cache (keyed by tebako
          # hash) covers only .tebako/deps and is shared across ruby versions;
          # the ruby-specific press output is handled by the per-ruby cache above.
          cache_path: .tebako/deps

      - name: Build runtime using gem
        if: matrix.env.container == null && matrix.env.os != 'windows'
        run: |
          echo "Building runtime for Ruby ${{ matrix.ruby }} on ${{ matrix.env.os }}/${{ matrix.env.arch }}"
          runtime="tebako-runtime-${{ needs.prepare.outputs.tebako-version }}-${{ matrix.ruby }}-${{ matrix.env.os }}-${{ matrix.env.arch }}"
          tebako press -m runtime -o "runtime-packages/$runtime" -R "${{ matrix.ruby }}" -p .tebako

      - name: Build runtime using gem on Windows
        if: matrix.env.container == null && matrix.env.os == 'windows'
        shell: msys2 {0}
        run: |
          git config --global core.longpaths true
          echo "Building runtime for Ruby ${{ matrix.ruby }} on ${{ matrix.env.os }}/${{ matrix.env.arch }}"
          runtime="tebako-runtime-${{ needs.prepare.outputs.tebako-version }}-${{ matrix.ruby }}-${{ matrix.env.os }}-${{ matrix.env.arch }}"
          tebako press -m runtime -o "runtime-packages/$runtime" -R "${{ matrix.ruby }}" -p .tebako

      # Diagnostics for tamatebako/tebako#345: on failure, surface the
      # ext/openssl mkmf log (which lib/header did extconf pick, and why did
      # the X509 accessor probes fail) and the generated ruby.exe link rule
      # (does it carry the --start-group wrapper) — cheap, only fires red
      - name: Dump diagnostics on failure (Windows)
        if: failure() && matrix.env.container == null && matrix.env.os == 'windows'
        shell: msys2 {0}
        run: |
          find .tebako/deps/src -path "*/ext/openssl/mkmf.log" -exec sh -c 'echo "== $1"; cat "$1"' _ {} \; || true
          find .tebako/deps/src -maxdepth 2 -name Makefile -exec sh -c 'echo "== $1 (ruby.exe rule)"; grep -n -B2 -A6 "^ruby.exe" "$1" || true' _ {} \; || true

      - name: Upload runtime package
        uses: actions/upload-artifact@v4
        with:
          name: runtime-packages-${{ matrix.env.os }}-${{ matrix.env.arch }}-${{ matrix.ruby }}
          path: runtime-packages
          retention-days: 1

  release:
    name: Update release packages
    needs: [prepare, build]
    runs-on: ubuntu-latest
    # Never touch the production release from a pull request; otherwise run
    # whenever the run was not cancelled, even if some build matrix legs
    # failed (upload whatever artifacts exist; missing packages are reported
    # loudly by scripts/upload_release.rb). Slice dispatches may opt out of
    # publishing (publish=false) for pure debugging runs.
    if: ${{ always() && !cancelled() && github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Download all runtime packages
        uses: actions/download-artifact@v4
        with:
          path: runtime-packages
          merge-multiple: true

      # Fold in artifacts produced by earlier runs (e.g. a cancelled full
      # build) so a slice run can complete a release without rebuilding
      # platforms it does not touch. Current-run packages win on name
      # collisions (cp -n).
      - name: Download runtime packages from additional runs
        if: inputs.artifact_run_ids != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_IDS: ${{ inputs.artifact_run_ids }}
        run: |
          set -euo pipefail
          for rid in ${RUN_IDS//,/ }; do
            echo "Fetching runtime-packages-* artifacts from run $rid"
            gh run download "$rid" --repo tamatebako/tebako-runtime-ruby \
              -p 'runtime-packages-*' -D "runtime-packages-runs/$rid"
          done
          find runtime-packages-runs -type f -exec cp -n {} runtime-packages/ \;

      - name: Setup Ruby gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Update release using Ruby script
        env:
          TEBAKO_VERSION: ${{ needs.prepare.outputs.tebako-version }}
          EXPECTED_ENV_MATRIX: ${{ needs.prepare.outputs.env-matrix }}
          EXPECTED_RUBY_MATRIX: ${{ needs.prepare.outputs.ruby-matrix }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild == 'true' }}
        run: |
          ./scripts/upload_release.rb
